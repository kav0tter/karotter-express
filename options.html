<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>karotter Express — 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>karotter Express <span>設定</span></h1>
    </header>

    <main>
      <!-- プリセット管理 -->
      <section class="preset-section">
        <h2 class="section-title">プリセット</h2>
        <div id="preset-list"></div>
        <div class="preset-save-row">
          <input id="preset-name-input" type="text" placeholder="新しいプリセット名..." maxlength="30">
          <button id="preset-save-btn" class="btn secondary small">現在の設定を保存</button>
        </div>
      </section>

      <!-- 表示オプション -->
      <section>
        <h2 class="section-title">表示オプション</h2>
        <div class="toggle-list">
          <label class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">インラインヒント</span>
              <span class="toggle-desc">各投稿のボタン上にショートカットキーを表示します</span>
            </div>
            <input type="checkbox" id="toggle-inline-hints" class="toggle-checkbox">
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">フローティングパネル</span>
              <span class="toggle-desc">画面右下にキー一覧を常時表示します</span>
            </div>
            <input type="checkbox" id="toggle-floating-panel" class="toggle-checkbox">
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <!-- キーバインド編集 -->
      <section>
        <h2 class="section-title">キーバインド</h2>
        <div id="conflict-banner" class="banner error hidden">
          同じキーが複数のアクションに割り当てられています。修正してください。
        </div>
        <table id="bindings-table">
          <thead>
            <tr>
              <th>アクション</th>
              <th>キー</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="bindings-body"></tbody>
        </table>
        <div class="actions">
          <button id="save-btn" class="btn primary">保存</button>
          <button id="reset-btn" class="btn secondary">デフォルトに戻す</button>
        </div>
        <div id="save-banner" class="banner success hidden">設定を保存しました。</div>
      </section>
    </main>
  </div>

  <script src="defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
